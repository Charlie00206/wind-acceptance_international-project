<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>风电混塔埋件验收单</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f4f7fa; padding: 15px; }
    .container { max-width: 650px; margin: 0 auto; background: white; border-radius: 16px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    h2 { text-align: center; color: #1e3a5f; margin-bottom: 20px; }
    h3 { font-size: 1em; color: #2c3e50; border-left: 4px solid #2563eb; padding-left: 10px; margin: 18px 0 8px; }
    .form-group { margin-bottom: 12px; }
    label { display: block; font-weight: 600; margin-bottom: 4px; color: #333; font-size: 0.9em; }
    input[type="text"], input[type="date"], input[type="number"], textarea, select {
      width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 8px;
      font-size: 16px; background: #f9fafb; transition: border 0.2s;
    }
    textarea { resize: vertical; min-height: 60px; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: #2563eb; background: white; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
    .grid-5 input { padding: 8px; font-size: 14px; }
    .btn {
      width: 100%; padding: 12px; background: #2563eb; color: white; border: none;
      border-radius: 10px; font-size: 1em; font-weight: 600; cursor: pointer; margin-top: 8px;
    }
    .btn:active { background: #1d4ed8; }
    .btn-secondary { background: #64748b; }
    .btn-danger { background: #dc2626; }
    .btn-small { width: auto; display: inline-block; padding: 8px 18px; font-size: 0.9em; }
    .radio-group { display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }
    .radio-group label { font-weight: normal; display: flex; align-items: center; gap: 4px; }
    .list-item { background: #f8fafc; border: 1px solid #e2e8f0; padding: 8px 12px; border-radius: 8px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
    .badge { background: #2563eb; color: white; padding: 2px 10px; border-radius: 20px; font-size: 0.8em; }
    .tip { font-size: 0.8em; color: #666; text-align: center; margin-top: 6px; }
    details { margin-bottom: 10px; }
    details summary { background: #f0f4ff; padding: 10px; border-radius: 8px; font-weight: 600; }
    input[readonly] { background-color: #eef2ff; font-weight: bold; color: #1e3a5f; }
  </style>
</head>
<body>
  <div class="container">
    <h2>📋 埋件进场验收单</h2>

    <!-- 待生成列表展示 -->
    <div id="cartArea" style="margin-bottom: 15px;">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <strong>📦 待生成列表 (<span id="cartCount">0</span>)</strong>
        <button type="button" class="btn-small btn-danger" onclick="clearAll()">一键清空</button>
      </div>
      <div id="cartList" style="margin-top: 8px; max-height: 180px; overflow-y: auto;"></div>
    </div>

    <form id="checkForm">
      <!-- 基本信息 -->
      <h3>📌 基本信息</h3>
      <div class="form-group">
        <label>项目名称</label>
        <select name="project" id="projectField" required>
          <option value="">请选择项目</option>
          <option value="沙特阿拉伯利雅得省斯特拉 Acwa power 2000(MW)混塔项目">沙特阿拉伯利雅得省斯特拉 Acwa power 2000(MW)混塔项目</option>
          <option value="沙特阿拉伯利雅得省夏奇拉 Acwa power 1000(MW)混塔项目">沙特阿拉伯利雅得省夏奇拉 Acwa power 1000(MW)混塔项目</option>
        </select>
      </div>
      <div class="grid-2">
        <div class="form-group"><label>生产厂家</label><input type="text" name="factory" required></div>
        <div class="form-group">
          <label>材料名称</label>
          <select name="material" required>
            <option value="">请选择埋件类型</option>
            <option>M48吊点埋件</option>
            <option>M16蛇形埋件</option>
            <option>M20挂点埋件</option>
            <option>接地埋件</option>
            <option>限位埋件</option>
            <option>调平埋件</option>
            <option>摄像机埋件</option>
          </select>
        </div>
      </div>
      <div class="grid-2">
        <div class="form-group"><label>进场数量</label><input type="number" name="quantity" required></div>
        <div class="form-group"><label>进场日期</label><input type="date" name="inData" required></div>
      </div>
      <div class="form-group"><label>检验日期</label><input type="date" name="checkData" required></div>

      <!-- 工程资料检验（四个子项） -->
      <h3>📄 工程资料检验</h3>
      <div class="form-group"><label>出场合格证及质量证明文件 – 检测批次</label><input type="text" name="No1" placeholder="例如：批号2024-001"></div>
      <div class="radio-group">
        <label><input type="radio" name="cert_result" value="符合要求"> 符合要求</label>
        <label><input type="radio" name="cert_result" value="不符合要求"> 不符合要求</label>
      </div>

      <div class="form-group"><label>尺寸检验报告 – 检测批次</label><input type="text" name="No2"></div>
      <div class="radio-group">
        <label><input type="radio" name="dim_result" value="符合要求"> 符合要求</label>
        <label><input type="radio" name="dim_result" value="不符合要求"> 不符合要求</label>
      </div>

      <div class="form-group"><label>原材料质保书 – 检测批次</label><input type="text" name="No3"></div>
      <div class="radio-group">
        <label><input type="radio" name="raw_result" value="符合要求"> 符合要求</label>
        <label><input type="radio" name="raw_result" value="不符合要求"> 不符合要求</label>
      </div>

      <div class="form-group"><label>发货清单 – 检测批次</label><input type="text" name="No4"></div>
      <div class="radio-group">
        <label><input type="radio" name="list_result" value="符合要求"> 符合要求</label>
        <label><input type="radio" name="list_result" value="不符合要求"> 不符合要求</label>
      </div>

      <!-- 现场检验：尺寸检验 -->
      <h3>🔧 尺寸检验 (抽检3件/批)</h3>
      <details open>
        <summary>第一组</summary>
        <div class="grid-5" style="margin-top:8px;">
          <input type="text" name="d1" placeholder=""><input type="text" name="d2" placeholder=""><input type="text" name="d3" placeholder=""><input type="text" name="d4" placeholder=""><input type="text" name="d5" placeholder="">
        </div>
        <div class="radio-group">
          <label><input type="radio" name="con5" value="合格"> 合格</label>
          <label><input type="radio" name="con5" value="不合格"> 不合格</label>
        </div>
      </details>
      <details open>
        <summary>第二组</summary>
        <div class="grid-5" style="margin-top:8px;">
          <input type="text" name="d6" placeholder=""><input type="text" name="d7" placeholder=""><input type="text" name="d8" placeholder=""><input type="text" name="d9" placeholder=""><input type="text" name="d10" placeholder="">
        </div>
        <div class="radio-group">
          <label><input type="radio" name="con6" value="合格"> 合格</label>
          <label><input type="radio" name="con6" value="不合格"> 不合格</label>
        </div>
      </details>

      <!-- 镀锌层厚度检测 -->
      <h3>🔧 镀锌层厚度检测 (抽检3件/批)</h3>
      <details open>
        <summary>第一组</summary>
        <div class="grid-5" style="margin-top:8px;">
          <input type="text" name="d11" placeholder=""><input type="text" name="d12" placeholder=""><input type="text" name="d13" placeholder=""><input type="text" name="d14" placeholder=""><input type="text" name="d15" placeholder="">
        </div>
        <div class="radio-group">
          <label><input type="radio" name="con7" value="合格"> 合格</label>
          <label><input type="radio" name="con7" value="不合格"> 不合格</label>
        </div>
      </details>
      <details open>
        <summary>第二组</summary>
        <div class="grid-5" style="margin-top:8px;">
          <input type="text" name="d16" placeholder=""><input type="text" name="d17" placeholder=""><input type="text" name="d18" placeholder=""><input type="text" name="d19" placeholder=""><input type="text" name="d20" placeholder="">
        </div>
        <div class="radio-group">
          <label><input type="radio" name="con8" value="合格"> 合格</label>
          <label><input type="radio" name="con8" value="不合格"> 不合格</label>
        </div>
      </details>

      <!-- 内螺纹拧入深度 -->
      <h3>🔧 内螺纹拧入深度 (抽检3件/批)</h3>
      <details open>
        <summary>第一组</summary>
        <div class="grid-5" style="margin-top:8px;">
          <input type="text" name="d21" placeholder=""><input type="text" name="d22" placeholder=""><input type="text" name="d23" placeholder=""><input type="text" name="d24" placeholder=""><input type="text" name="d25" placeholder="">
        </div>
        <div class="radio-group">
          <label><input type="radio" name="con9" value="合格"> 合格</label>
          <label><input type="radio" name="con9" value="不合格"> 不合格</label>
        </div>
      </details>
      <details open>
        <summary>第二组</summary>
        <div class="grid-5" style="margin-top:8px;">
          <input type="text" name="d26" placeholder=""><input type="text" name="d27" placeholder=""><input type="text" name="d28" placeholder=""><input type="text" name="d29" placeholder=""><input type="text" name="d30" placeholder="">
        </div>
        <div class="radio-group">
          <label><input type="radio" name="con10" value="合格"> 合格</label>
          <label><input type="radio" name="con10" value="不合格"> 不合格</label>
        </div>
      </details>

      <!-- 外观 -->
      <h3>🔧 外观、划伤、凹痕、包装</h3>
      <div class="radio-group">
        <label><input type="radio" name="appearance_result" value="符合要求"> 符合要求</label>
        <label><input type="radio" name="appearance_result" value="不符合要求"> 不符合要求</label>
      </div>

      <!-- 整体验收结论（自动判定） -->
      <h3>✅ 整体验收结论（自动判定）</h3>
      <div class="form-group">
        <input type="text" id="conclusionDisplay" readonly>
      </div>

      <h3>✍️ 签名</h3>
      <div class="grid-2">
        <div class="form-group"><label>质检员/日期</label><input type="text" name="inspector"></div>
        <div class="form-group"><label>专业工程师/日期</label><input type="text" name="engineer"></div>
      </div>

      <button type="button" class="btn" onclick="addToList()">➕ 添加到待生成列表</button>
      <button type="button" class="btn btn-secondary" onclick="generateAll()" style="margin-top:6px;">📥 生成全部验收单（Word）</button>
    </form>
    <div class="tip">可重复添加不同埋件，最终生成一个包含多页的 Word 文档</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/pizzip@3.1.4/dist/pizzip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docxtemplater@3.37.12/build/docxtemplater.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>

  <script>
    // 待生成数据列表
    let recordList = [];

    // 自动回填上次填写内容
    (function(){
      const saved = localStorage.getItem('acceptance_last');
      if (!saved) return;
      try {
        const data = JSON.parse(saved);
        for (let [k, v] of Object.entries(data)) {
          const el = document.querySelector(`[name="${k}"]`);
          if (!el) continue;
          if (el.type === 'radio') {
            const radio = document.querySelector(`input[name="${k}"][value="${v}"]`);
            if (radio) radio.checked = true;
          } else {
            el.value = v;
          }
        }
      } catch(e){}
    })();

    // 保存当前表单数据用于自动回填
    function saveTempData() {
      const form = document.getElementById('checkForm');
      const data = {};
      for (let el of form.elements) {
        if (!el.name) continue;
        if (el.type === 'radio') {
          if (el.checked) data[el.name] = el.value;
        } else {
          data[el.name] = el.value;
        }
      }
      localStorage.setItem('acceptance_last', JSON.stringify(data));
    }

    // 实时更新结论显示（不改变其他数据）
    function updateConclusionDisplay() {
      const form = document.getElementById('checkForm');
      const temp = {};
      for (let el of form.elements) {
        if (!el.name) continue;
        if (el.type === 'radio') {
          if (el.checked) temp[el.name] = el.value;
        }
      }

      // 工程资料结论
      const con1 = temp.cert_result === '符合要求' ? '合格' : (temp.cert_result ? '不合格' : '');
      const con2 = temp.dim_result === '符合要求' ? '合格' : (temp.dim_result ? '不合格' : '');
      const con3 = temp.raw_result === '符合要求' ? '合格' : (temp.raw_result ? '不合格' : '');
      const con4 = temp.list_result === '符合要求' ? '合格' : (temp.list_result ? '不合格' : '');

      // 外观结论
      const con11 = temp.appearance_result === '符合要求' ? '合格' : (temp.appearance_result ? '不合格' : '');

      // 现场检验结论直接取 radio 值
      const con5 = temp.con5 || '';
      const con6 = temp.con6 || '';
      const con7 = temp.con7 || '';
      const con8 = temp.con8 || '';
      const con9 = temp.con9 || '';
      const con10 = temp.con10 || '';

      const conclusionFields = [con1, con2, con3, con4, con5, con6, con7, con8, con9, con10, con11];
      let allPass = true;
      for (let f of conclusionFields) {
        if (f !== '合格') {
          allPass = false;
          break;
        }
      }

      // 只有当所有必须的结论都已选择时才显示结果，否则显示空（避免未填完就显示不合格）
      const allFilled = conclusionFields.every(f => f !== '');
      const conclusionText = allFilled ? (allPass ? '合格，予以接收' : '不合格，拒绝接收') : '';

      const display = document.getElementById('conclusionDisplay');
      if (display) display.value = conclusionText;
    }

    // 收集表单数据并自动计算所有自动结论
    function collectFormData() {
      const form = document.getElementById('checkForm');
      const data = {};
      for (let el of form.elements) {
        if (!el.name) continue;
        if (el.type === 'radio') {
          if (el.checked) data[el.name] = el.value;
        } else {
          data[el.name] = el.value;
        }
      }

      // 工程资料检验结果映射到模板需要的占位符
      data.certification = data.cert_result === '符合要求' ? '符合要求' : (data.cert_result ? '不符合要求' : '');
      data.dimension = data.dim_result === '符合要求' ? '符合要求' : (data.dim_result ? '不符合要求' : '');
      data.raw_material = data.raw_result === '符合要求' ? '符合要求' : (data.raw_result ? '不符合要求' : '');
      data.list = data.list_result === '符合要求' ? '符合要求' : (data.list_result ? '不符合要求' : '');

      // 工程资料结论自动生成
      data.con1 = data.cert_result === '符合要求' ? '合格' : (data.cert_result ? '不合格' : '');
      data.con2 = data.dim_result === '符合要求' ? '合格' : (data.dim_result ? '不合格' : '');
      data.con3 = data.raw_result === '符合要求' ? '合格' : (data.raw_result ? '不合格' : '');
      data.con4 = data.list_result === '符合要求' ? '合格' : (data.list_result ? '不合格' : '');

      // 外观处理：将选择结果放入 appearance，并自动生成 con11
      data.appearance = data.appearance_result || '';
      data.con11 = data.appearance_result === '符合要求' ? '合格' : (data.appearance_result ? '不合格' : '');

      // 清理不需要直接渲染的 radio 字段（模板里没有对应占位符）
      delete data.cert_result;
      delete data.dim_result;
      delete data.raw_result;
      delete data.list_result;
      delete data.appearance_result;

      // 自动计算整体验收结论
      const conclusionFields = ['con1','con2','con3','con4','con5','con6','con7','con8','con9','con10','con11'];
      let allPass = true;
      for (let f of conclusionFields) {
        if (data[f] !== '合格') {
          allPass = false;
          break;
        }
      }
      data.conclusion = allPass ? '合格，予以接收' : '不合格，拒绝接收';

      return data;
    }

    // 添加到待生成列表
    function addToList() {
      const form = document.getElementById('checkForm');
      // 基本必填校验
      if (!form.project.value || !form.factory.value || !form.material.value || !form.quantity.value || !form.inData.value || !form.checkData.value) {
        alert('请完整填写基本信息（项目、厂家、材料、数量、进场日期、检验日期）');
        return;
      }
      const data = collectFormData();
      recordList.push(data);
      updateCartDisplay();
      clearFormFields(false);
      saveTempData();
    }

    // 清空表单（保留项目、材料、厂家以便连续填写）
    function clearFormFields(resetAll = false) {
      const form = document.getElementById('checkForm');
      for (let el of form.elements) {
        if (el.type === 'radio') {
          el.checked = false;
        } else if (el.type !== 'button' && el.type !== 'submit' && el.name) {
          if (!resetAll && (el.name === 'project' || el.name === 'factory' || el.name === 'material')) continue;
          el.value = '';
        }
      }
      const display = document.getElementById('conclusionDisplay');
      if (display) display.value = '';
    }

    // 一键清空（列表 + 表单 + 缓存）
    function clearAll() {
      recordList = [];
      updateCartDisplay();
      clearFormFields(true);
      localStorage.removeItem('acceptance_last');
      document.getElementById('projectField').value = '';
    }

    // 更新待生成列表显示
    function updateCartDisplay() {
      document.getElementById('cartCount').textContent = recordList.length;
      const listDiv = document.getElementById('cartList');
      if (recordList.length === 0) {
        listDiv.innerHTML = '<div style="color:#999; text-align:center;">暂无添加的验收单</div>';
        return;
      }
      let html = '';
      recordList.forEach((item, idx) => {
        html += `<div class="list-item">
          <span><span class="badge">${idx+1}</span> ${item.material || '未选'} – ${item.inData || ''} (${item.factory || ''})</span>
          <button type="button" class="btn-small btn-danger" style="padding:4px 10px;" onclick="removeItem(${idx})">删除</button>
        </div>`;
      });
      listDiv.innerHTML = html;
    }

    function removeItem(index) {
      recordList.splice(index, 1);
      updateCartDisplay();
    }

    // 生成单个验收单 Word Blob
    async function renderOneDocx(data) {
      const resp = await fetch('template.docx');
      if (!resp.ok) throw new Error('模板文件 template.docx 加载失败，请确认已上传到仓库根目录');
      const arrayBuffer = await resp.arrayBuffer();
      const zip = new PizZip(arrayBuffer);
      const doc = new docxtemplater(zip, { paragraphLoop: true, linebreaks: true });
      doc.render(data);
      const blob = doc.getZip().generate({
        type: 'blob',
        mimeType: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document'
      });
      return blob;
    }

    // 合并多个 Docx Blob（按顺序分页）
    async function mergeDocxBlobs(blobs) {
      if (blobs.length === 0) throw new Error('没有可生成的验收单');
      if (blobs.length === 1) return blobs[0];

      const baseZip = new PizZip(await blobs[0].arrayBuffer());
      let baseDocXml = baseZip.file("word/document.xml").asText();

      for (let i = 1; i < blobs.length; i++) {
        const nextZip = new PizZip(await blobs[i].arrayBuffer());
        let nextDocXml = nextZip.file("word/document.xml").asText();

        const bodyMatch = nextDocXml.match(/<w:body[^>]*>([\s\S]*)<\/w:body>/i);
        if (!bodyMatch) continue;
        let innerContent = bodyMatch[1];

        const pageBreak = '<w:p><w:r><w:br w:type="page"/></w:r></w:p>';
        baseDocXml = baseDocXml.replace('</w:body>', pageBreak + innerContent + '</w:body>');
      }

      baseZip.file("word/document.xml", baseDocXml);
      return baseZip.generate({
        type: 'blob',
        mimeType: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document'
      });
    }

    // 生成全部文档并下载
    async function generateAll() {
      if (recordList.length === 0) {
        alert('请先添加至少一个埋件的验收数据');
        return;
      }
      try {
        const blobs = [];
        for (const data of recordList) {
          const blob = await renderOneDocx(data);
          blobs.push(blob);
        }
        const finalBlob = await mergeDocxBlobs(blobs);
        const safeName = (recordList[0].project || '验收单').replace(/[\\/:*?"<>|]/g, '_');
        saveAs(finalBlob, `埋件验收单_${safeName}_${new Date().toISOString().slice(0,10)}.docx`);
        saveTempData();
      } catch (error) {
        console.error(error);
        alert('生成失败：' + error.message);
      }
    }

    // 绑定 radio 变化事件，实时更新结论
    document.addEventListener('change', function(e) {
      if (e.target.type === 'radio') {
        updateConclusionDisplay();
      }
    });

    // 页面加载完，根据可能缓存的数据或默认状态更新一次
    window.addEventListener('DOMContentLoaded', function() {
      updateConclusionDisplay();
    });

    window.addEventListener('beforeunload', saveTempData);
  </script>
